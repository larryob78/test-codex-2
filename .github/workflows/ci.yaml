name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm lint
      - run: pnpm test
      - run: go test ./apps/bidder/...
      - run: poetry install
      - run: poetry run pytest
      - run: docker build -f infra/docker/web.Dockerfile -t web .
