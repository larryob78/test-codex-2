version: '3.9'

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - STORYBOARD_CORS_ORIGINS=*
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    ports:
      - '4173:4173'
    depends_on:
      - backend
